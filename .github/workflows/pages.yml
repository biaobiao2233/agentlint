name: Publish AgentLint public demo

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "examples/**"
      - "pyproject.toml"
      - "scripts/build_public_site.py"
      - "scripts/__init__.py"
      - "site/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the local package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run the reproducible verification suite
        run: python -m pytest -p no:cacheprovider
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build the static fake-fixture demo
        run: python scripts/build_public_site.py --output "$RUNNER_TEMP/agentlint-public-demo"
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/agentlint-public-demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
